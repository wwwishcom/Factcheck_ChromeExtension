<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 380px; background: #fafaf7;
  font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
  color: #0d1b2a; overflow-x: hidden;
}

/* HEADER */
.hd { background: #003087; padding: 13px 16px; display: flex; align-items: center; gap: 10px; }
.hd-logo { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0; }
.hd-info h1 { font-size: 13px; font-weight: 700; color: #fff; }
.hd-info p  { font-size: 9px; color: rgba(255,255,255,0.5); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; }
.hd-key-btn { margin-left: auto; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.75); font-size: 10px; font-weight: 600; padding: 4px 9px; border-radius: 6px; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
.hd-key-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

/* API KEY PANEL */
.key-panel { display: none; background: #002570; padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.key-panel.open { display: block; }
.key-row { display: flex; gap: 6px; }
.key-input { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 7px; padding: 7px 10px; color: #fff; font-size: 11px; font-family: monospace; outline: none; }
.key-input::placeholder { color: rgba(255,255,255,0.3); }
.key-input:focus { border-color: rgba(255,255,255,0.45); }
.key-save { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #fff; font-size: 11px; font-weight: 700; padding: 7px 12px; border-radius: 7px; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
.key-save:hover { background: rgba(255,255,255,0.25); }
.key-status { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 5px; }
.key-status.ok  { color: #4ade80; }
.key-status.err { color: #f87171; }

/* MAIN */
.main { padding: 14px 14px 20px; }
.btn { width: 100%; padding: 12px; background: #003087; color: #fff; font-size: 13px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: background 0.18s; }
.btn:hover { background: #1a4da8; }
.btn.loading { opacity: 0.65; pointer-events: none; }
.hint { font-size: 10px; color: #8fa0b4; text-align: center; margin-top: 7px; line-height: 1.5; }
#result { margin-top: 12px; display: none; }

/* ════ BATTERY HERO ════ */
.battery-hero { border-radius: 12px; overflow: hidden; margin-bottom: 10px; border: 1px solid rgba(0,48,135,0.2); }
.battery-top { background: #003087; padding: 12px 16px 8px; display: flex; align-items: flex-start; justify-content: space-between; }
.battery-left {}
.battery-grade { font-size: 15px; font-weight: 700; color: #fff; }
.battery-desc  { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 3px; }
.battery-score-wrap { text-align: right; }
.battery-score-num { font-size: 38px; font-weight: 900; color: #fff; line-height: 1; }
.battery-score-pt  { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.55); margin-left: 1px; }

.battery-bar-area { background: #003087; padding: 6px 16px 14px; display: flex; align-items: center; gap: 4px; }
.battery-track { flex: 1; height: 22px; border: 2px solid rgba(255,255,255,0.3); border-radius: 5px; background: rgba(255,255,255,0.07); overflow: hidden; position: relative; }
.battery-fill { height: 100%; border-radius: 3px; transition: width 1.1s cubic-bezier(.4,0,.2,1); position: relative; }
.battery-fill::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 40%, rgba(255,255,255,0.15)); }
.battery-nub { width: 5px; height: 12px; background: rgba(255,255,255,0.28); border-radius: 0 3px 3px 0; flex-shrink: 0; }
.battery-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.9); pointer-events: none; }

/* SUMMARY */
.summary-card { background: #fff; border: 1px solid #e4e8f0; border-left: 3px solid #003087; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
.sec-label { font-size: 10px; font-weight: 800; color: #003087; letter-spacing: 1.8px; text-transform: uppercase; display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }
.summary-title { font-size: 13px; font-weight: 700; color: #0d1b2a; line-height: 1.55; margin-bottom: 6px; }
.summary-body  { font-size: 12px; color: #4a607a; line-height: 1.7; }

/* SKELETON */
.skel { height: 10px; background: linear-gradient(90deg, #f0f0ee 25%, #e4e4e2 50%, #f0f0ee 75%); background-size: 200%; animation: sk 1.5s infinite; border-radius: 5px; margin-bottom: 5px; }
.skel.w70 { width: 70%; } .skel.w85 { width: 85%; }
@keyframes sk { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* FEATURE CARDS */
.fc { background: #fff; border: 1px solid #e4e8f0; border-radius: 12px; margin-bottom: 7px; overflow: hidden; transition: border-color 0.18s; }
.fc:hover { border-color: #003087; }
.fc:last-child { margin-bottom: 0; }
.fc-head { display: flex; align-items: center; gap: 9px; padding: 11px 14px; cursor: pointer; user-select: none; -webkit-user-select: none; }
.fc-num { font-size: 9px; font-weight: 800; color: #003087; background: #eef2fb; border-radius: 4px; padding: 2px 5px; min-width: 22px; text-align: center; flex-shrink: 0; }
.fc-icon { font-size: 15px; flex-shrink: 0; }
.fc-title { font-size: 13px; font-weight: 700; color: #0d1b2a; flex: 1; }
.fc-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; border: 1px solid; flex-shrink: 0; }
.fc-arrow { font-size: 8px; color: #8fa0b4; transition: transform 0.2s; flex-shrink: 0; margin-left: 2px; }
.fc-arrow.open { transform: rotate(180deg); }
.fc-body { display: none; padding: 4px 14px 13px; border-top: 1px solid #f2f2f0; }
.fc-body.open { display: block; }

/* INNER ELEMENTS */
.bar { height: 5px; background: #f0f0ee; border-radius: 3px; overflow: hidden; margin: 7px 0; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.9s cubic-bezier(.4,0,.2,1); }
.w5r { display: flex; align-items: center; gap: 7px; padding: 5px 0; border-bottom: 1px solid #f5f5f3; }
.w5r:last-child { border-bottom: none; }
.w5-dot { width: 17px; height: 17px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; flex-shrink: 0; }
.w5-dot.hit  { background: #f0faf4; color: #16a34a; }
.w5-dot.miss { background: #fef2f2; color: #dc2626; }
.w5-lbl { font-weight: 600; color: #4a607a; min-width: 88px; font-size: 12px; }
.w5-ev  { color: #003087; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
.w5-no  { color: #dc2626; font-size: 10px; opacity: 0.6; }
.sd-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-top: 8px; }
.sd-row .lbl { color: #4a607a; } .sd-row .wt { font-size: 9px; color: #8fa0b4; margin-left: 3px; } .sd-row .val { font-weight: 700; }
.formula { font-size: 10px; color: #8fa0b4; border-top: 1px solid #f0f0ee; padding-top: 9px; margin-top: 6px; text-align: center; line-height: 1.7; }
.sub-txt { font-size: 12px; color: #4a607a; margin-top: 8px; line-height: 1.6; }

/* TAGS */
.tag-lbl { font-size: 10px; color: #8fa0b4; margin: 7px 0 3px; }
.tag-row { display: flex; flex-wrap: wrap; gap: 3px; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; border: 1px solid; }
.tag.ok   { background: #f0faf4; color: #16a34a; border-color: rgba(22,163,74,.2); }
.tag.miss { background: #fef2f2; color: #dc2626; border-color: rgba(220,38,38,.2); }
.tag.warn { background: #fffbeb; color: #b45309; border-color: rgba(180,83,9,.2); }
.tag.blue { background: #eef2fb; color: #003087; border-color: rgba(0,48,135,.2); }

/* LLM CONTENT */
.llm-term { padding: 7px 0; border-bottom: 1px solid #f5f5f3; }
.llm-term:last-child { border-bottom: none; }
.llm-term-name { font-size: 11px; font-weight: 700; color: #003087; margin-bottom: 2px; }
.llm-term-exp  { font-size: 11px; color: #4a607a; line-height: 1.5; }
.llm-ind { background: #f8f9fc; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
.llm-ind:last-child { margin-bottom: 0; }
.llm-ind-name { font-size: 10px; color: #8fa0b4; font-weight: 600; }
.llm-ind-val  { font-size: 13px; font-weight: 800; color: #003087; margin: 2px 0; }
.llm-ind-ctx  { font-size: 10px; color: #4a607a; }
.llm-claim { display: flex; gap: 7px; align-items: flex-start; padding: 5px 0; border-bottom: 1px solid #f5f5f3; font-size: 11px; color: #4a607a; line-height: 1.5; }
.llm-claim:last-child { border-bottom: none; }
.llm-claim-dot { width: 5px; height: 5px; border-radius: 50%; background: #003087; flex-shrink: 0; margin-top: 6px; }
.llm-kw-note { font-size: 10px; color: #8fa0b4; margin-top: 8px; line-height: 1.5; }

/* OK / BETA / ERR */
.ok-txt { font-size: 11px; color: #16a34a; margin-top: 7px; display: flex; align-items: center; gap: 5px; }
.beta-box { display: flex; align-items: flex-start; gap: 8px; background: #f4f6fb; border-radius: 8px; padding: 10px 11px; margin-top: 6px; font-size: 11px; color: #6a80a0; line-height: 1.6; }
.beta-pill { font-size: 8px; font-weight: 800; background: #003087; color: #fff; padding: 3px 6px; border-radius: 4px; flex-shrink: 0; margin-top: 1px; }
.err-box { background: #fef2f2; border: 1px solid rgba(220,38,38,.18); border-radius: 10px; padding: 11px 13px; font-size: 12px; color: #dc2626; line-height: 1.6; }

/* COLORS */
.c-g{color:#16a34a!important} .c-y{color:#b45309!important} .c-r{color:#dc2626!important}
.bg-g{background:#16a34a!important} .bg-y{background:#b45309!important} .bg-r{background:#dc2626!important}
.bdg-g{background:#f0faf4;color:#16a34a;border-color:rgba(22,163,74,.25)!important}
.bdg-y{background:#fffbeb;color:#b45309;border-color:rgba(180,83,9,.25)!important}
.bdg-r{background:#fef2f2;color:#dc2626;border-color:rgba(220,38,38,.25)!important}
.bdg-b{background:#eef2fb;color:#003087;border-color:rgba(0,48,135,.18)!important}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-logo">FF</div>
  <div class="hd-info">
    <h1>Factcheck-Finger</h1>
    <p>News Credibility Verifier</p>
  </div>
  <button class="hd-key-btn" id="keyToggleBtn">API 키 입력</button>
</div>

<div class="key-panel" id="keyPanel">
  <div class="key-row">
    <input class="key-input" id="keyInput" type="password" placeholder="sk-ant-api03-..." />
    <button class="key-save" id="keySaveBtn">저장</button>
  </div>
  <div class="key-status" id="keyStatus"></div>
</div>

<div class="main">
  <button class="btn" id="analyzeBtn">
    <span>🔍</span> 이 기사 분석하기
  </button>
  <p class="hint">뉴스 사이트에서 자동 분석 · 어느 페이지에서도 수동 분석 가능</p>
  <div id="result"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
